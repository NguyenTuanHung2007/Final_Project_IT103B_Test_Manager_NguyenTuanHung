<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizzForge - Thêm bài test</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/add-test.css" />
    <link rel="stylesheet" href="../css/toast.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <div class="logo">
          <a href="./home.html" style="text-decoration: none; color: inherit"
            >QuizzForge</a
          >
        </div>
        <nav class="nav-links">
          <a href="./home.html">Trang chủ</a>
          <a href="./category-manager.html">Danh mục</a>
          <a href="./test-manager.html" class="active">Bài test</a>
          <a href="./login.html">Đăng xuất</a>
        </nav>
        <button class="hamburger" aria-label="Toggle menu">☰</button>
      </div>
    </header>

    <main class="container main-content">
      <h1 class="page-title">Tạo bài test</h1>

      <div class="test-info-section">
        <div class="form-group">
          <label>Tên bài test</label>
          <input
            type="text"
            placeholder="Điền tên bài test"
            class="form-control"
          />
        </div>
        <div class="form-group">
          <label>Hình ảnh bài test</label>
          <div class="file-input-wrapper">
            <label for="test-img" class="btn-file"> 📁 Chọn ảnh </label>
            <input type="file" id="test-img" accept="image/*" />
            <span class="file-name" id="file-name">Chưa chọn ảnh</span>
          </div>
        </div>
        <div class="row">
          <div class="form-group flex-1">
            <label>Danh mục</label>
            <select class="form-control">
              <option>Chọn danh mục</option>
            </select>
          </div>
          <div class="form-group flex-time">
            <label>Thời gian (phút)</label>
            <input
              type="number"
              step="1"
              min="1"
              value="15"
              class="form-control"
            />
          </div>
        </div>
      </div>

      <div class="question-management">
        <h2 class="sub-title">Quản lý câu hỏi</h2>
        <div class="action-bar">
          <button class="btn btn-primary" id="btnAddNewQuestion">
            Thêm câu hỏi
          </button>
          <button class="btn btn-primary btn-save-all">Lưu tất cả</button>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width: 80px" class="text-center">ID</th>
                <th>Câu hỏi</th>
                <th style="width: 180px" class="text-center">Hành động</th>
              </tr>
            </thead>
            <tbody id="questionTableBody">
              <!-- Dòng dữ liệu sẽ render ở đây -->
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Modal Thêm/Sửa câu hỏi -->
    <div class="modal-overlay" id="questionModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Thêm/sửa câu hỏi</h3>
          <span class="close-modal" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Câu hỏi</label>
            <input
              type="text"
              id="modalQuestionInput"
              placeholder="Nhập câu hỏi"
              class="form-control"
            />
          </div>

          <div class="form-group">
            <label>Câu trả lời</label>
            <!-- Nơi JS sẽ chèn 4 ô mặc định vào đây -->
            <div class="answer-list" id="modalAnswerList"></div>
            <button class="btn btn-add-answer" onclick="addAnswerRow()">
              Thêm câu trả lời
            </button>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-cancel" onclick="closeModal()">Huỷ</button>
          <button class="btn btn-save" onclick="saveQuestion()">Lưu</button>
        </div>
      </div>
    </div>

    <!-- Modal Xác nhận xóa -->
    <div class="modal-overlay" id="deleteModal">
      <div class="modal-content delete-modal-content">
        <div class="modal-header">
          <h3>Xác nhận xóa</h3>
          <span class="close-modal" onclick="closeDeleteModal()">&times;</span>
        </div>
        <div class="modal-body">
          <p>Bạn có chắc chắn muốn xóa câu hỏi này không?</p>
        </div>
        <div class="modal-footer" style="justify-content: center">
          <button class="btn btn-secondary" onclick="closeDeleteModal()">
            Huỷ
          </button>
          <button class="btn btn-danger" id="confirmDeleteBtn">Xóa</button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="../js/add-test.js"></script>
    <script src="../js/toast.js"></script>
  </body>
</html>
